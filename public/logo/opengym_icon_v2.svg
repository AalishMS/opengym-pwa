<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    </style>
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2.5" cy="2.5" r="2.5" fill="#555555"/>
    </pattern>
    <mask id="gym-mask">
      <text x="512" y="640" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="148" font-weight="700" letter-spacing="-4" fill="white">GYM</text>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0D0D0D"/>

  <!-- Outer border box -->
  <rect x="32" y="32" width="960" height="960" fill="none" stroke="#333333" stroke-width="3"/>

  <!-- Top terminal bar -->
  <rect x="32" y="32" width="960" height="56" fill="#1A1A1A" stroke="#333333" stroke-width="2"/>
  <text x="72" y="68" font-family="'JetBrains Mono', monospace" font-size="24" fill="#444444">● ● ●</text>
  <text x="512" y="68" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="20" fill="#333333">opengym v1.0</text>

  <!-- Barbell symbol (white) -->
  <!-- Left outer plate -->
  <rect x="110" y="240" width="28" height="120" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Left inner plate -->
  <rect x="138" y="258" width="18" height="84" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Bar -->
  <rect x="156" y="293" width="712" height="14" fill="#FFFFFF"/>
  <!-- Right inner plate -->
  <rect x="868" y="258" width="18" height="84" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Right outer plate -->
  <rect x="886" y="240" width="28" height="120" fill="none" stroke="#FFFFFF" stroke-width="3"/>

  <!-- Center grip marks on bar -->
  <rect x="440" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="452" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="464" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="476" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="488" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="500" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="512" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="524" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="536" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="548" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="560" y="287" width="4" height="26" fill="#0D0D0D"/>
  <rect x="572" y="287" width="4" height="26" fill="#0D0D0D"/>

  <!-- OPEN text -->
  <text x="512" y="560" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="148" font-weight="700" fill="#E0E0E0" letter-spacing="-4">OPEN</text>

  <!-- GYM dotted -->
  <rect x="92" y="492" width="840" height="160" fill="url(#dots)" mask="url(#gym-mask)"/>

  <!-- Tagline -->
  <text x="512" y="850" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#333333">// track. lift. repeat.</text>

  <!-- Bottom corner brackets -->
  <text x="72" y="970" font-family="'JetBrains Mono', monospace" font-size="36" fill="#222222">[</text>
  <text x="952" y="970" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="36" fill="#222222">]</text>
</svg>
