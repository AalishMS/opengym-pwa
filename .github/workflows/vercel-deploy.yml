name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        run: |
          for attempt in 1 2 3; do
            echo "Vercel deploy attempt ${attempt}"
            output="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true)"
            printf '%s\n' "$output"

            if echo "$output" | grep -q "Production:"; then
              url="$(echo "$output" | grep -Eo 'https://[^ ]+vercel.app' | tail -n 1)"
              if [ -n "$url" ] && vercel inspect "$url" --timeout=300 --token=${{ secrets.VERCEL_TOKEN }}; then
                exit 0
              fi
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 20
            fi
          done
          exit 1
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
